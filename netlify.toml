[build]
  base = "frontend/myapp"
  publish = "build"
  command = "npm run build"
  [build.environment]
    BROWSERSLIST_IGNORE_OLD_DATA = "1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://flaskbackend-h7hha2bpedbug6f6.southeastasia-01.azurewebsites.net/:splat"
  status = 200
  force = true
